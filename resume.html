  <main class="container section">
    <h1>个人简历</h1>
    <p>
      邮箱：your@email.com |
      GitHub：<a href="https://github.com/" target="_blank">你的GitHub</a>

    <p>
      <a class="btn primary" href="./files/resume.pdf" target="_blank">在线查看 PDF</a>

    <section class="card">
      <h2>个人简介</h2>

    <section class="card">
      <h2>教育经历</h2>
      <p>学校名称 / 专业 / 时间 / 关键成绩</p>

    <section class="card">
      <h2>项目经历</h2>
      <p>项目名 + 你的贡献 + 结果（尽量量化）</p>
    </section>

    <section class="card">
      <h2>技能清单</h2>
      <span class="tag">JavaScript</span>
      <span class="tag">Python</span>
      <span class="tag">SQL</span>
      <span class="tag">Git</span>
    </section>

  <footer class="container footer">
    最后更新：2026-04
